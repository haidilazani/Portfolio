<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aidil Azani – Gallery</title>
    <script>
        (function () {
            var t; try { t = localStorage.getItem('theme'); } catch (e) { }
            document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        })();
    </script>
    <link rel="stylesheet" href="css/portfolio.css">
    <link rel="stylesheet" href="css/gallery.css">
</head>

<body>

    <header class="site-nav">
        <nav class="glass-nav" aria-label="Main navigation">
            <a href="index.html" class="nav-logo">aidil<span>.</span></a>
            <ul class="nav-links">
                <li class="nav-indicator" aria-hidden="true"></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="work.html">Work</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="memory.html">Memory</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark / light mode">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
                </svg>
            </button>
        </nav>
    </header>

    <main class="gallery-layout">
        <aside class="gallery-sidebar">
            <!-- Section: Photos -->
            <div class="sidebar-section">
                <h6 class="section-title">Photos</h6>
                <ul class="folder-list">
                    <li class="folder-item active" data-folder="all">
                        <span class="folder-icon">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                </path>
                            </svg>
                        </span>
                        Library
                    </li>
                    <li class="folder-item" data-folder="favorites">
                        <span class="folder-icon">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path
                                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                                </path>
                            </svg>
                        </span>
                        Favorites
                    </li>
                    <li class="folder-item" data-folder="recents">
                        <span class="folder-icon">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </span>
                        Recents
                    </li>
                </ul>
            </div>

            <!-- Section: Collections -->
            <div class="sidebar-section">
                <h6 class="section-title">Collections</h6>
                <ul class="folder-list">
                    <li class="folder-item" data-folder="memories">
                        <span class="folder-icon">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                                </path>
                            </svg>
                        </span>
                        Memories
                    </li>
                    <li class="folder-item" data-folder="albums">
                        <span class="folder-icon">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path
                                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                                </path>
                            </svg>
                        </span>
                        Albums
                    </li>
                </ul>
            </div>

        </aside>

        <section class="gallery-content">
            <div id="gallery-collage" class="collage-container">
                <!-- Images will be injected by JS -->
            </div>
        </section>
    </main>
    <footer>
        &copy; 2026 Aidil Azani. All rights reserved.
    </footer>

    <script src="js/navbar.js"></script>
    <script src="js/gallery.js"></script>
</body>

</html>
